apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-cad
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/krerte/cad-backend:latest
          ports: [{ containerPort: 8080 }]
          env:
            - name: WORKER_URL
              value: "http://worker:8000"
            - name: SLICER_URL
              value: "http://slicer:8100"
            - name: CLAUDE_MODEL
              value: "claude-opus-4-6"
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: ai-cad-secrets, key: ANTHROPIC_API_KEY } }
            - name: MESHY_API_KEY
              valueFrom: { secretKeyRef: { name: ai-cad-secrets, key: MESHY_API_KEY, optional: true } }
            # --- Pricing partners (kõik optional — tühjad väärtused = fallback heuristika) ---
            - name: PRICING_KODA_KEY
              valueFrom: { secretKeyRef: { name: ai-cad-secrets, key: PRICING_KODA_KEY, optional: true } }
            - name: PRICING_PRINTIDUD_KEY
              valueFrom: { secretKeyRef: { name: ai-cad-secrets, key: PRICING_PRINTIDUD_KEY, optional: true } }
            - name: PRICING_SHAPEWAYS_KEY
              valueFrom: { secretKeyRef: { name: ai-cad-secrets, key: PRICING_SHAPEWAYS_KEY, optional: true } }
            - name: PRICING_TREATSTOCK_KEY
              valueFrom: { secretKeyRef: { name: ai-cad-secrets, key: PRICING_TREATSTOCK_KEY, optional: true } }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-cad
spec:
  selector: { app: backend }
  ports: [{ port: 8080, targetPort: 8080 }]
