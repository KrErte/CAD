apiVersion: apps/v1
kind: Deployment
metadata:
  name: slicer
  namespace: ai-cad
spec:
  replicas: 1
  selector:
    matchLabels: { app: slicer }
  template:
    metadata:
      labels: { app: slicer }
    spec:
      containers:
        - name: slicer
          image: ghcr.io/krerte/cad-slicer:latest
          ports: [{ containerPort: 8100 }]
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 8100 }
            initialDelaySeconds: 25
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8100 }
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: slicer
  namespace: ai-cad
spec:
  selector: { app: slicer }
  ports: [{ port: 8100, targetPort: 8100 }]
