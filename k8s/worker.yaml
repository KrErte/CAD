apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-cad
spec:
  replicas: 2
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/krerte/cad-worker:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: ai-cad
spec:
  selector: { app: worker }
  ports: [{ port: 8000, targetPort: 8000 }]
