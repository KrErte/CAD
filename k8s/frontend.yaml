apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-cad
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/krerte/cad-frontend:latest
          ports: [{ containerPort: 4200 }]
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ai-cad
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 4200 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-cad
  namespace: ai-cad
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [cad.krerte.ee]
      secretName: ai-cad-tls
  rules:
    - host: cad.krerte.ee
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: backend,  port: { number: 8080 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: frontend, port: { number: 80 } } }
