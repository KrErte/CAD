# cp -> secret.yaml, fill in real values, then `kubectl apply -f secret.yaml`
# secret.yaml is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: ai-cad-secrets
  namespace: ai-cad
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-..."
  MESHY_API_KEY: ""
  # Partnerite hinnavõrdlus — tühjad väärtused = provider on disabled ja
  # kasutaja näeb heuristilist fallback-hindu, mitte päris hindasid.
  PRICING_KODA_KEY: ""
  PRICING_PRINTIDUD_KEY: ""
  PRICING_SHAPEWAYS_KEY: ""
  PRICING_TREATSTOCK_KEY: ""
