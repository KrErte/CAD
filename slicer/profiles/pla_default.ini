# Minimal PrusaSlicer print config (INI format) for PLA on a 0.4 mm nozzle.
# Values chosen to match a "reasonable default print" — 0.2 mm layers,
# 20 % gyroid infill, 3 perimeters, 60 mm/s, 1.75 mm PLA.
# Override via /slice request body when the caller wants something else.

# --- Printer ---------------------------------------------------------------
printer_technology = FFF
nozzle_diameter = 0.4
bed_shape = 0x0,250x0,250x210,0x210
max_print_height = 210
gcode_flavor = marlin

# --- Print ----------------------------------------------------------------
layer_height = 0.2
first_layer_height = 0.25
perimeters = 3
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 20%
fill_pattern = gyroid
top_fill_pattern = monotonic
bottom_fill_pattern = monotonic
perimeter_speed = 45
external_perimeter_speed = 30
infill_speed = 80
travel_speed = 150
first_layer_speed = 20
support_material = 0
brim_width = 0
skirts = 1
skirt_distance = 2

# --- Filament (PLA) -------------------------------------------------------
filament_type = PLA
filament_diameter = 1.75
filament_density = 1.24
filament_cost = 25
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 60
