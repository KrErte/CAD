name: Release
on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/cad

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Kohustuslik SBOM + attestation jaoks
      id-token: write
      attestations: write
    strategy:
      matrix:
        component: [backend, worker, slicer, frontend]
    outputs:
      digest-backend: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/setup-qemu-action@v4   # multi-arch (arm64 + amd64)

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SBOM + provenance attestation'id embed'itakse image'i sisse
          sbom: true
          provenance: mode=max

      # ── Trivy scan — avastab CVE'd image'ist ───────────────────────
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL,HIGH
          # Ei fail'i CI'd (release jätkub), aga tulemused lähevad Security tab'i
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

      # ── Cosign keyless signing (OIDC via GitHub Actions) ───────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign container image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      # ── Syft SBOM export — eraldi fail koos release'iga ───────────
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.component }}.spdx.json
          upload-artifact: true

      # ── GitHub build provenance (SLSA Level 3-compatible) ──────────
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  deploy:
    needs: images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production   # vajab manual approval GitHub settings'is
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/CAD
            docker compose -f docker-compose.prod.yml pull
            # Blue-green'ile pehmelt: up -d (without --force-recreate), tervisekontrolli
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # Ootame 30s, et service'id oleks ready enne prune'i
            sleep 30
            docker image prune -f
            echo "Deployed $(git rev-parse --short HEAD) at $(date -u +%FT%TZ)"
