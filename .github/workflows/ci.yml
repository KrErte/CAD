name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Build backend
        run: cd backend && ./gradlew build --no-daemon || gradle build --no-daemon

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install minimal deps for import smoke
        run: pip install fastapi pydantic httpx
      - name: Import smoke
        run: cd worker && python -c "import sys; sys.modules.setdefault('cadquery', __import__('types').ModuleType('cadquery')); print('ok')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm ci && npm run build
