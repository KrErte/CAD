name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & test
        # Wrapper (gradlew) is not checked in to the repo, so we use the
        # installed gradle directly — same build script, same result.
        run: gradle build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx ng build --configuration=production

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install & smoke test
        run: |
          pip install fastapi pydantic httpx uvicorn
          python -c "from importlib.util import find_spec; print('FastAPI OK')"

  slicer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slicer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # PrusaSlicer is NOT needed for unit tests — the happy-path test
      # monkey-patches the subprocess call and feeds a fixture gcode.
      - name: Install test deps
        run: pip install -r requirements.txt pytest httpx
      - name: Run tests
        run: pytest -v

  # ────────────────── Deploy (only on main push) ──────────────────
  deploy:
    needs: [backend, frontend, worker, slicer]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /opt/CAD
            git pull origin main
            docker compose up -d --build
            docker image prune -f
            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"
