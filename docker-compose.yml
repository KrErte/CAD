services:
  worker:
    build: ./worker
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-6}
      WORKER_URL: http://worker:8000
      MESHY_API_KEY: ${MESHY_API_KEY:-}
    depends_on:
      worker:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports: ["4200:4200"]
    depends_on:
      - backend
