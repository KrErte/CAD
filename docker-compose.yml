services:
  worker:
    build: ./worker
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  slicer:
    build: ./slicer
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aicad
      POSTGRES_USER: aicad
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aicad}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicad"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-6}
      WORKER_URL: http://worker:8000
      SLICER_URL: http://slicer:8001
      MESHY_API_KEY: ${MESHY_API_KEY:-}
      DB_URL: jdbc:postgresql://db:5432/aicad
      DB_USER: aicad
      DB_PASSWORD: ${DB_PASSWORD:-aicad}
      JWT_SECRET: ${JWT_SECRET:-change-me-please-change-me-please-32bytes!!}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-{baseUrl}/login/oauth2/code/{registrationId}}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_HOBI: ${STRIPE_PRICE_HOBI:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-production}
      # ── Redis cache + distributed rate limiting ──
      REDIS_URL: redis://redis:6379
      SPRING_DATA_REDIS_URL: redis://redis:6379
      # ── Object storage (MinIO) ──
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: cad-artifacts
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_REGION: eu-north-1
      STORAGE_PATH_STYLE: "true"
      FREE_MONTHLY_QUOTA: ${FREE_MONTHLY_QUOTA:-3}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@tehisaicad.ee}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-m6rnaja@gmail.com}
    depends_on:
      worker:
        condition: service_healthy
      slicer:
        condition: service_healthy
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports: ["4200:4200"]
    depends_on:
      - backend

volumes:
  pgdata:
