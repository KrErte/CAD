# Infrastructure add-on: Redis + MinIO + postgres with pgvector
#
# Käivita koos põhi-compose'iga:
#   docker compose -f docker-compose.yml -f docker-compose.infra.yml up -d
#
# Või CI-s integration-testide jaoks:
#   docker compose -f docker-compose.infra.yml up redis minio

services:
  # Postgres asendame pgvector/pgvector:pg16 image'iga — sama Postgres 16,
  # aga pgvector extension juba kompileeritud ja kohal.
  db:
    image: pgvector/pgvector:pg16
    # Ülejäänud sätted (env, volumes, healthcheck) päritakse põhi-compose'ist

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot bucket init — loob bucket'i kui pole, seab policy
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/cad-artifacts;
        mc mb --ignore-existing local/cad-archive;
        # Lifecycle: pärast 30 päeva kolib cold storage'i (tiering)
        mc ilm add --expiry-days 90 local/cad-archive || true;
        echo 'MinIO buckets ready.';
      "

volumes:
  redisdata:
  miniodata:
