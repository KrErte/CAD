image:
  registry: ghcr.io/krerte
  tag: latest
  pullPolicy: IfNotPresent

backend:
  replicas: 2
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 1Gi }
  env:
    CLAUDE_MODEL: claude-opus-4-6

worker:
  replicas: 2
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 1Gi }

slicer:
  enabled: true
  replicas: 1
  # PrusaSlicer slicing is CPU-bound; limit more generously to let a single
  # long multi-day print slice finish instead of OOM/CPU-throttling.
  resources:
    requests: { cpu: 300m, memory: 512Mi }
    limits:   { cpu: 2,    memory: 2Gi }

frontend:
  replicas: 2

ingress:
  enabled: true
  host: cad.krerte.ee
  className: nginx
  tlsSecret: ai-cad-tls

# Provide via --set-string secrets.anthropicApiKey=...
secrets:
  anthropicApiKey: ""
  meshyApiKey: ""
