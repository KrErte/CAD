image:
  registry: ghcr.io/krerte
  tag: latest
  pullPolicy: IfNotPresent

# Environment tag — läheb APP_ENV env var'i, kasutatakse Micrometer tag'ides,
# Sentry environment'is, Grafana filter'ites.
env: prod

backend:
  replicas: 2
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 1Gi }
  env:
    CLAUDE_MODEL: claude-opus-4-6
  # PodDisruptionBudget — vähemalt 1 pod peab alati olemas olema
  pdb:
    enabled: true
    minAvailable: 1
  # HPA — skaleeri CPU utilization'i järgi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

worker:
  replicas: 2
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 1Gi }

slicer:
  enabled: true
  replicas: 1
  # PrusaSlicer slicing is CPU-bound; limit more generously to let a single
  # long multi-day print slice finish instead of OOM/CPU-throttling.
  resources:
    requests: { cpu: 300m, memory: 512Mi }
    limits:   { cpu: 2,    memory: 2Gi }

frontend:
  replicas: 2

ingress:
  enabled: true
  host: cad.krerte.ee
  className: nginx
  tlsSecret: ai-cad-tls

# Provide via --set-string secrets.anthropicApiKey=...
secrets:
  anthropicApiKey: ""
  meshyApiKey: ""
  # Partnerite 3D-print hinnavõrdlus — tühjad = fallback heuristilisele
  # hinnangule. Reaalsed API-võtmed saadavad päriselt päringu partneri API-sse.
  pricing:
    kodaApiKey: ""
    printidudApiKey: ""
    shapewaysApiKey: ""
    treatstockApiKey: ""

# ──────────────────────────────────────────────────────────────────────
# Observability — Prometheus, Grafana, OpenTelemetry, Loki
# ──────────────────────────────────────────────────────────────────────
# Eeldab, et klastris on paigaldatud kube-prometheus-stack
# (https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack)
# Kui ei ole, siis annotation-based scrape on tagasilange.
observability:
  serviceMonitor:
    # Loob ServiceMonitor CR backendile — Prometheus Operator skräpib automaatselt
    enabled: true
    interval: 30s
    # Label, mida sinu Prometheus instance otsib (tavaliselt release: monitoring)
    labels:
      release: kube-prometheus-stack

  grafanaDashboard:
    # ConfigMap AI-CAD overview dashboardiga. Grafana sidecar (vt
    # kube-prometheus-stack values) koristab selle label'i järgi üles.
    enabled: true
    labels: {}

  tracing:
    # Kui true, backend saadab span'id OTLP endpoint'i (Tempo/Jaeger/collector).
    enabled: false
    otlpEndpoint: "http://tempo.monitoring.svc.cluster.local:4318"
    # Prod-is 0.1 (10%), dev-is 1.0
    samplingProbability: "0.1"

  logging:
    # Loki HTTP push URL — kui tühi, siis Loki appender inaktiivne ja logid
    # lähevad ainult stdout'i (kus fluent-bit / promtail neid korjab, sõltuvalt
    # platvormist).
    lokiUrl: ""
