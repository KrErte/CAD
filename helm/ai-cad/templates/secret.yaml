apiVersion: v1
kind: Secret
metadata:
  name: ai-cad-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  MESHY_API_KEY: {{ .Values.secrets.meshyApiKey | quote }}
  PRICING_KODA_KEY: {{ .Values.secrets.pricing.kodaApiKey | default "" | quote }}
  PRICING_PRINTIDUD_KEY: {{ .Values.secrets.pricing.printidudApiKey | default "" | quote }}
  PRICING_SHAPEWAYS_KEY: {{ .Values.secrets.pricing.shapewaysApiKey | default "" | quote }}
  PRICING_TREATSTOCK_KEY: {{ .Values.secrets.pricing.treatstockApiKey | default "" | quote }}
