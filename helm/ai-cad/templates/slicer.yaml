{{- if .Values.slicer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slicer
spec:
  replicas: {{ .Values.slicer.replicas }}
  selector: { matchLabels: { app: slicer } }
  template:
    metadata: { labels: { app: slicer } }
    spec:
      containers:
        - name: slicer
          image: {{ include "ai-cad.image" (dict "Values" .Values "component" "slicer") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 8100 }]
          resources: {{ toYaml .Values.slicer.resources | nindent 12 }}
          # PrusaSlicer can be slow to cold-start (xvfb + GTK init), so
          # readinessProbe has a generous initialDelay.
          readinessProbe:
            httpGet: { path: /health, port: 8100 }
            initialDelaySeconds: 25
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8100 }
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata: { name: slicer }
spec:
  selector: { app: slicer }
  ports: [{ port: 8100, targetPort: 8100 }]
{{- end }}
