server:
  port: 8080
  # Graceful shutdown — lase poolelioleval päringul lõpetada enne et pod kinni pannakse
  shutdown: graceful

spring:
  application:
    name: ai-cad-backend
  lifecycle:
    timeout-per-shutdown-phase: 30s
  servlet:
    multipart:
      max-file-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aicad}
    username: ${DB_USER:aicad}
    password: ${DB_PASSWORD:aicad}
    hikari:
      # Prometheus saab pool-i meetrikad automaatselt
      register-mbeans: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: true   # JPA statistika Micrometer'isse
  flyway:
    enabled: true
    locations: classpath:db/migration
  # ── Redis cache + session + distributed rate limiter ──
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  cache:
    type: redis
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,email,profile
            redirect-uri: ${OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# ──────────────────────────────────────────────────────────────────────
# Actuator + Micrometer + OpenTelemetry
# ──────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # Avame ainult need, mis Prometheus + k8s probe'id vajavad.
        # info / env / beans jne on sees ainult dev-profile'is.
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      # Liveness/readiness groupid eraldi — k8s'is eraldi probe'id.
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState,diskSpace
        readiness:
          # Readiness sõltub DB + dependent service'idest
          include: readinessState,db,claudeApi,worker,slicer
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${APP_ENV:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        claude.api.duration: true
        worker.api.duration: true
        slicer.api.duration: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        claude.api.duration: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 500ms, 2s, 10s
  tracing:
    sampling:
      # 100% dev, prod-is peaks olema 0.1 (10%) via APP_ENV üle-kirjutus
      probability: ${TRACING_SAMPLE:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      # OTel collector / Tempo / Jaeger endpoint
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
      compression: gzip
  info:
    env:
      enabled: true
    git:
      mode: full
    build:
      enabled: true

# Build info meta (vajame actuator/info endpoint'is)
info:
  app:
    name: ${spring.application.name}
    description: AI-driven Estonian-language parametric CAD service
    environment: ${APP_ENV:local}

app:
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${CLAUDE_MODEL:claude-opus-4-6}
    base-url: https://api.anthropic.com
  worker:
    url: ${WORKER_URL:http://localhost:8000}
  slicer:
    url: ${SLICER_URL:}
    timeout-seconds: ${SLICER_TIMEOUT_SEC:150}
  meshy:
    api-key: ${MESHY_API_KEY:}
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-32bytes!!}
    ttl-hours: 24
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  quota:
    free-monthly: ${FREE_MONTHLY_QUOTA:3}
    pro-monthly: ${PRO_MONTHLY_QUOTA:50}
    business-monthly: ${BUSINESS_MONTHLY_QUOTA:200}
  ratelimit:
    spec-per-hour: ${RATELIMIT_SPEC:20}
    generate-per-hour: ${RATELIMIT_GENERATE:10}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    # Uus 3-tier struktuur: Free (0€), Pro (14.99€/kuu), Business (49.99€/kuu)
    price-pro:      ${STRIPE_PRICE_PRO:price_xxx}
    price-business: ${STRIPE_PRICE_BUSINESS:price_xxx}
    # Legacy — jääb alles tagasiühilduvuseks
    price-hobi: ${STRIPE_PRICE_HOBI:}
    price-maker-monthly: ${STRIPE_PRICE_MAKER_MONTHLY:}
    price-maker-yearly:  ${STRIPE_PRICE_MAKER_YEARLY:}
    price-pro-monthly:   ${STRIPE_PRICE_PRO_MONTHLY:}
    price-pro-yearly:    ${STRIPE_PRICE_PRO_YEARLY:}
    price-team-monthly:  ${STRIPE_PRICE_TEAM_MONTHLY:}
    price-team-yearly:   ${STRIPE_PRICE_TEAM_YEARLY:}
  mail:
    from: ${MAIL_FROM:noreply@tehisaicad.ee}
    enabled: ${MAIL_ENABLED:false}
  admin:
    emails: ${ADMIN_EMAILS:m6rnaja@gmail.com}
  pricing:
    koda:
      api-key: ${PRICING_KODA_KEY:}
      base-url: ${PRICING_KODA_URL:https://api.3dkoda.ee}
    printidud:
      api-key: ${PRICING_PRINTIDUD_KEY:}
      base-url: ${PRICING_PRINTIDUD_URL:https://api.3dprinditud.ee}
    shapeways:
      api-key: ${PRICING_SHAPEWAYS_KEY:}
      base-url: ${PRICING_SHAPEWAYS_URL:https://api.shapeways.com}
    treatstock:
      api-key: ${PRICING_TREATSTOCK_KEY:}
      base-url: ${PRICING_TREATSTOCK_URL:https://api.treatstock.com}
  # Claude API hinnakiri (€/1M token) — kasutame cost meetrikas
  pricing-claude:
    input-eur-per-mtok: ${CLAUDE_INPUT_EUR_PER_MTOK:13.5}    # ~ $15/M USD
    output-eur-per-mtok: ${CLAUDE_OUTPUT_EUR_PER_MTOK:67.5}  # ~ $75/M USD

  # ── Object storage (S3 / MinIO) ──
  storage:
    endpoint: ${STORAGE_ENDPOINT:}               # tühi = päris AWS S3, region'ist lähtub
    bucket:   ${STORAGE_BUCKET:cad-artifacts}
    region:   ${STORAGE_REGION:eu-north-1}
    access-key: ${STORAGE_ACCESS_KEY:}
    secret-key: ${STORAGE_SECRET_KEY:}
    path-style: ${STORAGE_PATH_STYLE:true}       # MinIO = true, AWS = false

  # ── Redis (dev default localhost, prod k8s service DNS) ──
  redis:
    url: ${REDIS_URL:redis://localhost:6379}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:development}
  traces-sample-rate: 0.1
  send-default-pii: false
  exception-resolver-order: -2147483647

logging:
  level:
    ee.krerte: DEBUG
  pattern:
    # Loki-sõbralik pattern — traceId/spanId automaatselt MDC-s
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
