server:
  port: 8080

spring:
  application:
    name: ai-cad-backend
  servlet:
    multipart:
      max-file-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aicad}
    username: ${DB_USER:aicad}
    password: ${DB_PASSWORD:aicad}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${CLAUDE_MODEL:claude-opus-4-6}
    base-url: https://api.anthropic.com
  worker:
    url: ${WORKER_URL:http://localhost:8000}
  slicer:
    url: ${SLICER_URL:}
    timeout-seconds: ${SLICER_TIMEOUT_SEC:150}
  meshy:
    api-key: ${MESHY_API_KEY:}
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-32bytes!!}
    ttl-hours: 24
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  quota:
    free-monthly: ${FREE_MONTHLY_QUOTA:3}
  ratelimit:
    spec-per-hour: ${RATELIMIT_SPEC:20}
    generate-per-hour: ${RATELIMIT_GENERATE:10}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    # Legacy — jääb alles tagasiühilduvuseks (hobi → maker alias koodis)
    price-hobi: ${STRIPE_PRICE_HOBI:}
    price-pro:  ${STRIPE_PRICE_PRO:}
    # Uus 4-tier struktuur (2026) — kuu + aasta eraldi Price ID-d
    price-maker-monthly: ${STRIPE_PRICE_MAKER_MONTHLY:}
    price-maker-yearly:  ${STRIPE_PRICE_MAKER_YEARLY:}
    price-pro-monthly:   ${STRIPE_PRICE_PRO_MONTHLY:}
    price-pro-yearly:    ${STRIPE_PRICE_PRO_YEARLY:}
    price-team-monthly:  ${STRIPE_PRICE_TEAM_MONTHLY:}
    price-team-yearly:   ${STRIPE_PRICE_TEAM_YEARLY:}
  mail:
    from: ${MAIL_FROM:noreply@tehisaicad.ee}
    enabled: ${MAIL_ENABLED:false}
  admin:
    emails: ${ADMIN_EMAILS:m6rnaja@gmail.com}
  pricing:
    koda:
      api-key: ${PRICING_KODA_KEY:}
      base-url: ${PRICING_KODA_URL:https://api.3dkoda.ee}
    printidud:
      api-key: ${PRICING_PRINTIDUD_KEY:}
      base-url: ${PRICING_PRINTIDUD_URL:https://api.3dprinditud.ee}
    shapeways:
      api-key: ${PRICING_SHAPEWAYS_KEY:}
      base-url: ${PRICING_SHAPEWAYS_URL:https://api.shapeways.com}
    treatstock:
      api-key: ${PRICING_TREATSTOCK_KEY:}
      base-url: ${PRICING_TREATSTOCK_URL:https://api.treatstock.com}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:development}
  traces-sample-rate: 0.1
  send-default-pii: false
  exception-resolver-order: -2147483647

logging:
  level:
    ee.krerte: DEBUG
